name: CI

on:
  push:
    branches:
      - master
      - JFVM-refactor
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Instantiate
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      - name: Run tests
        run: julia --project -e 'using Pkg; Pkg.test()'

  perf-gate:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Instantiate
        run: julia --project -e 'using Pkg; Pkg.instantiate()'

      - name: Run performance gate
        run: julia --project benchmarks/perf_gate.jl
